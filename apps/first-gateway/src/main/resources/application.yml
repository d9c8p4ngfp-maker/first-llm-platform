server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: first-gateway
  task:
    scheduling:
      pool:
        size: 3
  profiles:
    active: dev
  lifecycle:
    timeout-per-shutdown-phase: 60s
  thread:
    virtual:
      enabled: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB
  datasource:
    url: jdbc:mysql://localhost:3306/first_gateway?useSSL=false&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      idle-timeout: 30000
      max-lifetime: 600000
      connection-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate.format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

ai-service:
  enabled: ${AI_SERVICE_ENABLED:true}
  chat: ${AI_SERVICE_CHAT:true}
  memory-extraction: ${AI_SERVICE_MEMORY_EXTRACTION:true}
  profile-synthesis: ${AI_SERVICE_PROFILE_SYNTHESIS:true}
  rag: ${AI_SERVICE_RAG:true}
  embedding-model: ${AI_SERVICE_EMBEDDING_MODEL:text-embedding-3-small}
  base-url: ${AI_SERVICE_BASE_URL:http://localhost:8000}
  internal-token: ${AI_SERVICE_INTERNAL_TOKEN:compose-internal-ai-token-32chars-min}
  connect-timeout-ms: 5000
  read-timeout-ms: 300000
  stream-read-timeout-ms: 300000
  retry:
    max-attempts: 2
    backoff-ms: 1000

gateway:
  retry:
    max-attempts: 3
  timeout:
    connect-ms: 5000
    read-ms: 60000
    stream-first-token-ms: 30000
    stream-total-ms: 300000
    sse-heartbeat-interval-ms: 15000
  billing:
    default-ratio: 1.0
    no-usage-strategy: estimate
  rate-limit:
    type: memory
  circuit-breaker:
    failure-threshold: 5
    open-duration-seconds: 30
  crypto:
    channel-key-secret: ${CHANNEL_KEY_SECRET:must-change-in-production}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:*,http://127.0.0.1:*}
  trace:
    header-name: X-Request-Id

auth:
  jwt:
    secret: ${JWT_SECRET:must-change-in-production-use-env-var-32b-min}
    expire-hours: ${JWT_EXPIRE_HOURS:2}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
    access:
      default: read-only
  endpoint:
    prometheus:
      access: read-only
  metrics:
    tags:
      application: first-gateway
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    root: INFO
    com.first.gateway: DEBUG
    org.hibernate.SQL: WARN

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
