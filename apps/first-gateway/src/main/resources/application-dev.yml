spring:
  config:
    import: optional:file:../../../.env
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  datasource:
    url: jdbc:mysql://localhost:3306/first_gateway?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:gateway}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  h2:
    console:
      enabled: false
  flyway:
    enabled: true

logging:
  file:
    name: logs/gateway-dev.log
  level:
    com.first.gateway: DEBUG

auth:
  jwt:
    secret: dev-jwt-secret-change-me-at-least-32-bytes-long
    expire-hours: 2

gateway:
  rate-limit:
    type: redis
  crypto:
    channel-key-secret: ${CHANNEL_KEY_SECRET:dev-channel-key-secret}
  upstream:
    deepseek-api-key: ${DEEPSEEK_API_KEY:}

ai-service:
  enabled: true
  chat: true
  memory-extraction: true
  profile-synthesis: true
  rag: true
  embedding-model: text-embedding-3-small
  stream-read-timeout-ms: 300000
  base-url: ${AI_SERVICE_BASE_URL:http://localhost:8000}
  internal-token: ${AI_SERVICE_INTERNAL_TOKEN:compose-internal-ai-token-32chars-min}
  connect-timeout-ms: 5000
  read-timeout-ms: 120000
  retry:
    max-attempts: 2
    backoff-ms: 1000
